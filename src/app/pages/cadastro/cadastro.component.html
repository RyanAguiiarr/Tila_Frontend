<div class="cadastro-card-container">
  <div class="cadastro-card">
    <div class="cadastro-header">
      <h1>Cadastro Médico</h1>
      <p>Crie sua conta profissional no Tila para gerar laudos automatizados.</p>
    </div>

    <!-- warning message placeholder missing in react, but I will keep structure identical -->

    <form (submit)="handleSubmit($event)" class="cadastro-form">
      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input
          type="text"
          id="nome"
          placeholder="Dr. João da Silva"
          class="form-input"
          [(ngModel)]="nome"
          name="nome"
        />
      </div>

      <div class="form-row">
        <div class="form-group flex-1">
          <label for="crm">CRM</label>
          <input
            type="text"
            id="crm"
            placeholder="000000-SP"
            class="form-input"
            [(ngModel)]="crm"
            name="crm"
          />
        </div>

        <div class="form-group flex-1">
          <label for="especialidade">Especialidade</label>
          <input
            type="text"
            id="especialidade"
            placeholder="Radiologia"
            class="form-input"
            [(ngModel)]="especialidade"
            name="especialidade"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">E-mail Profissional</label>
        <input
          type="email"
          id="email"
          placeholder="medico@clinica.com"
          class="form-input"
          [(ngModel)]="email"
          name="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            placeholder="••••••••"
            class="form-input password-input"
            [(ngModel)]="senha"
            name="senha"
          />
          <button
            type="button"
            class="toggle-password-btn"
            (click)="togglePasswordVisibility()"
            aria-label="Toggle password visibility"
          >
            <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>

      <button type="submit" class="submit-btn cadastro-submit-btn" (click)="handleCadastro($event)">
        <span class="material-icons btn-icon">person_add</span>
        Criar Conta
      </button>

      <div class="auth-switch-container">
        <span class="auth-switch-text">Já possui uma conta?</span>
        <button type="button" (click)="navigate('/login')" class="auth-switch-btn">
          Faça login
        </button>
      </div>
    </form>

    <app-security-badges></app-security-badges>
  </div>
</div>
